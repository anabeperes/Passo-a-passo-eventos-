<!DOCTYPE html>
<html lang="pt-BR">
<!--
  TRILHA — PARTICIPANTE (view-only)
  ==================================
  FIREBASE : cole a URL em CFG.firebase.url
  HOSPEDAGEM : netlify.com/drop (arraste o arquivo)
-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Trilha — Dia 01</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #0D1117;
      --bg2:   #161B22;
      --road:  #1A1E26;
      --edge:  #252B35;
      --dash:  #E8B500;
      --bdr:   #30363D;
      --text:  #C9D1D9;
      --muted: #484F58;
      --acc:   #E8B500;
      --px:    'Press Start 2P', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding-bottom: 40px; }

    /* ── HEADER ── */
    .hdr { background: #010409; border-bottom: 2px solid var(--bdr); padding: 16px 16px 12px; position: sticky; top: 0; z-index: 50; }
    .hdr-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .hdr-title { font-family: var(--px); font-size: 9px; color: #58A6FF; line-height: 1.9; flex: 1; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-top: 3px; margin-left: 10px; flex-shrink: 0; transition: background .4s; }
    .sync-dot.live { background: #3FB950; }
    .prog-bar { height: 6px; background: var(--bdr); overflow: hidden; }
    .prog-fill { height: 100%; background: var(--acc); transition: width .5s ease; }
    .prog-txt  { font-size: 10px; color: var(--muted); margin-top: 5px; font-family: monospace; }

    /* ── NOTICE ── */
    .notice { background: #1C1A00; border: 1px solid #4A3800; padding: 10px 14px; margin: 12px 16px 0; max-width: 500px; margin-left: auto; margin-right: auto; display: none; }
    .notice.on { display: block; }
    .notice-txt { font-family: var(--px); font-size: 7px; color: #A07000; line-height: 1.9; }

    /* ── TRAIL ── */
    .road-wrap { position: relative; max-width: 500px; margin: 0 auto; padding: 12px 0 24px; }
    #road-svg { display: block; width: 100%; height: auto; }
    #items-layer { position: absolute; top: 12px; left: 0; width: 100%; pointer-events: none; overflow: visible; }

    /* ── STOP MARKER ── */
    .stop-dot { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--bg); transform: translate(-50%,-50%); z-index: 2; pointer-events: none; }
    .stop-dot.off { background: var(--muted) !important; opacity: .35; }

    .stop-label { position: absolute; transform: translate(-50%,-50%); background: var(--bg2); border: 2px solid var(--bdr); padding: 6px 8px; max-width: 90px; pointer-events: none; z-index: 3; }
    .stop-label.off { opacity: .3; }
    .stop-num   { font-size: 9px; font-family: monospace; color: var(--muted); display: block; margin-bottom: 3px; }
    .stop-badge { font-family: var(--px); font-size: 5px; display: inline-block; padding: 2px 5px; margin-bottom: 4px; letter-spacing: .3px; }
    .stop-name  { font-family: var(--px); font-size: 6px; line-height: 1.75; color: var(--text); word-break: break-word; }
    .stop-label.off .stop-name { color: var(--muted); }
    .stop-label.stop-clickable:hover { border-color: var(--acc); background: var(--bg2); }

    /* ── STOP EMOJI ── */
    .stop-emoji { position: absolute; transform: translate(-50%,-50%); font-size: 22px; z-index: 3; pointer-events: auto; cursor: pointer; user-select: none; transition: transform .15s; }
    .stop-emoji:hover { transform: translate(-50%,-50%) scale(1.25); }
    .stop-emoji.off { opacity: .3; }

    /* ── CHECKPOINT ── */
    .cp-item { position: absolute; z-index: 5; pointer-events: auto; }
    .cp-sq {
      width: 38px; height: 38px; background: var(--bg); border: 2px solid var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transform: translate(-50%,-50%);
      transition: border-color .2s, background .2s;
    }
    .cp-sq:hover:not(.cp-lock) { border-color: var(--text); background: var(--bg2); }
    .cp-sq.has-c { border-color: var(--acc); }
    .cp-sq.cp-lock { opacity: .15; cursor: default; pointer-events: none; }
    .cp-ico { font-family: var(--px); font-size: 10px; color: var(--muted); user-select: none; line-height: 1; }
    .cp-sq.has-c .cp-ico { color: var(--acc); }

    /* ── START / END ── */
    .trail-flag { position: absolute; transform: translate(-50%,-50%); text-align: center; z-index: 6; pointer-events: none; }
    .flag-icon { font-size: 26px; display: block; }
    .flag-txt  { font-family: var(--px); font-size: 7px; color: var(--acc); display: block; margin-top: 4px; line-height: 1.7; white-space: nowrap; }

    /* ── PERSONAGEM ── */
    #char-layer { position: absolute; top: 12px; left: 0; width: 100%; pointer-events: none; overflow: visible; z-index: 10; }
    #trail-char {
      position: absolute;
      transition: left .9s cubic-bezier(.4,0,.2,1), top .9s cubic-bezier(.4,0,.2,1);
    }
    .char-inner {
      transform: translate(-50%, -100%);
      animation: char-bob 1.4s ease-in-out infinite;
      filter: drop-shadow(0 0 6px #E8B500) drop-shadow(0 2px 4px rgba(0,0,0,.8));
    }
    @keyframes char-bob {
      0%, 100% { transform: translate(-50%, -100%); }
      50%       { transform: translate(-50%, calc(-100% - 5px)); }
    }
    .char-inner.pop { animation: char-pop .35s ease-out, char-bob 1.4s ease-in-out infinite .35s; }
    @keyframes char-pop {
      0%  { transform: translate(-50%, calc(-100% - 10px)) scale(1.25); }
      100%{ transform: translate(-50%, -100%) scale(1); }
    }

    /* ── BOTTOM SHEET (checkpoint content) ── */
    .sheet-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; z-index: 150; }
    .sheet-bg.on { display: block; }
    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg2); border-top: 2px solid var(--acc);
      padding: 20px 18px 34px; max-width: 500px; margin: 0 auto;
      z-index: 160; max-height: 72vh; overflow-y: auto; display: none;
    }
    .sheet.on { display: block; }
    .sheet-lbl { font-family: var(--px); font-size: 7px; color: var(--acc); display: block; margin-bottom: 14px; line-height: 1.8; padding-right: 40px; }
    .sheet-desc { font-size: 14px; line-height: 1.75; color: #8B949E; white-space: pre-wrap; }
    .sheet-desc.empty { color: var(--muted); font-style: italic; font-size: 13px; }
    .sheet-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; padding: 9px 14px; background: var(--acc); color: #010409; text-decoration: none; font-family: var(--px); font-size: 7px; }
    .sheet-x { position: absolute; top: 16px; right: 16px; background: transparent; border: 1px solid var(--bdr); color: var(--muted); padding: 5px 9px; font-family: var(--px); font-size: 7px; cursor: pointer; }

    /* ── FAQ BUTTON ── */
    #faq-btn {
      position: fixed; top: 80px; right: 16px;
      background: var(--acc); color: #010409;
      border: none; cursor: pointer; z-index: 90;
      padding: 10px 12px; text-align: center;
      font-family: var(--px); font-size: 7px; line-height: 1.9;
      box-shadow: 0 4px 0 #8A6C00;
      transition: transform .1s, box-shadow .1s;
    }
    #faq-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #8A6C00; }
    #faq-btn .faq-icon { font-size: 22px; display: block; margin-bottom: 4px; }

    /* ── FAQ PANEL ── */
    #faq-panel {
      position: fixed; top: 190px; right: 16px;
      width: 260px; background: var(--bg2); border: 2px solid var(--acc);
      z-index: 91; display: none;
    }
    #faq-panel.on { display: block; }
    .faq-hdr {
      background: var(--acc); color: #010409;
      font-family: var(--px); font-size: 7px;
      padding: 8px 10px; display: flex; align-items: center; justify-content: space-between;
    }
    .faq-close {
      background: transparent; border: none; cursor: pointer;
      font-size: 14px; color: #010409; line-height: 1; padding: 0 2px;
    }
    .faq-item { border-bottom: 1px solid var(--bdr); }
    .faq-item:last-child { border-bottom: none; }
    .faq-q {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 10px 12px; cursor: pointer;
      font-family: var(--px); font-size: 9px; color: var(--text); line-height: 1.8;
      background: transparent; border: none; width: 100%; text-align: left;
    }
    .faq-q:hover { background: var(--bg); }
    .faq-arrow { flex-shrink: 0; color: var(--acc); font-size: 10px; transition: transform .2s; }
    .faq-item.open .faq-arrow { transform: rotate(90deg); }
    .faq-a {
      font-size: 14px; color: #8B949E; line-height: 1.7;
      padding: 0 12px 12px; display: none; white-space: pre-wrap;
    }
    .faq-item.open .faq-a { display: block; }
  </style>
</head>
<body>

<!-- FAQ BUTTON -->
<button id="faq-btn" onclick="toggleFaq()">
  <span class="faq-icon">📖</span>ME PERDI,<br>E AGORA?
</button>

<!-- FAQ PANEL -->
<div id="faq-panel">
  <div class="faq-hdr">
    FAQ
    <button class="faq-close" onclick="toggleFaq()">✕</button>
  </div>
  <div id="faq-list"></div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title" id="hdrTitle">TRILHA — DIA 01</div>
    <div class="sync-dot" id="syncDot"></div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <div class="prog-txt" id="progTxt">0 / 24 etapas liberadas</div>
</div>

<!-- NOTICE sem Firebase -->
<div class="notice" id="fbNotice">
  <div class="notice-txt">⚠ SEM SYNC EM TEMPO REAL<br>configure CFG.firebase.url</div>
</div>

<!-- TRAIL -->
<div class="road-wrap" id="roadWrap">
  <svg id="road-svg" viewBox="0 0 360 1300" xmlns="http://www.w3.org/2000/svg">
    <path id="road-path"
      d="M 60 60 L 280 60
         A 55 80 0 0 1 280 220
         L 60 220
         A 55 80 0 0 0 60 380
         L 280 380
         A 55 80 0 0 1 280 540
         L 60 540
         A 55 80 0 0 0 60 700
         L 280 700
         A 55 80 0 0 1 280 860
         L 60 860
         A 55 80 0 0 0 60 1020
         L 280 1020
         A 55 80 0 0 1 280 1180
         L 60 1180"
      stroke="#252B35" stroke-width="56" fill="none" stroke-linecap="round"/>
    <path
      d="M 60 60 L 280 60
         A 55 80 0 0 1 280 220
         L 60 220
         A 55 80 0 0 0 60 380
         L 280 380
         A 55 80 0 0 1 280 540
         L 60 540
         A 55 80 0 0 0 60 700
         L 280 700
         A 55 80 0 0 1 280 860
         L 60 860
         A 55 80 0 0 0 60 1020
         L 280 1020
         A 55 80 0 0 1 280 1180
         L 60 1180"
      stroke="#1A1E26" stroke-width="50" fill="none" stroke-linecap="round"/>
    <path
      d="M 60 60 L 280 60
         A 55 80 0 0 1 280 220
         L 60 220
         A 55 80 0 0 0 60 380
         L 280 380
         A 55 80 0 0 1 280 540
         L 60 540
         A 55 80 0 0 0 60 700
         L 280 700
         A 55 80 0 0 1 280 860
         L 60 860
         A 55 80 0 0 0 60 1020
         L 280 1020
         A 55 80 0 0 1 280 1180
         L 60 1180"
      stroke="#E8B500" stroke-width="2.5" fill="none"
      stroke-dasharray="14 14" stroke-linecap="butt"/>
  </svg>
  <div id="items-layer"></div>
  <div id="char-layer"></div>
</div>

<!-- BOTTOM SHEET -->
<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <button class="sheet-x" onclick="closeSheet()">✕</button>
  <span class="sheet-lbl" id="sheetLbl">CHECKPOINT</span>
  <div id="sheetDesc" class="sheet-desc empty">sem instruções ainda</div>
  <a id="sheetLink" href="#" target="_blank" class="sheet-link" style="display:none">ACESSAR →</a>
</div>

<script>
// ════════════════════════════════════
//  FAQ
// ════════════════════════════════════
const FAQ_ITEMS = [
  {
    q: "Me perdi, onde ele está agora?",
    a: "Clique no bonequinho na trilha e descubra onde estamos."
  },
  {
    q: "Onde está o link dos materiais?",
    a: "O link dos materiais está aqui: http://vtsd.com.br/materiais-ia"
  },
  {
    q: "A trilha não atualiza, o que faço?",
    a: "Aperte F5"
  },
];

function buildFaq(){
  const list = document.getElementById('faq-list');
  list.innerHTML = '';
  FAQ_ITEMS.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'faq-item';
    el.innerHTML =
      `<button class="faq-q" onclick="toggleFaqItem(${i})">` +
        `<span>${item.q}</span>` +
        `<span class="faq-arrow">▶</span>` +
      `</button>` +
      `<div class="faq-a">${item.a}</div>`;
    list.appendChild(el);
  });
}

function toggleFaqItem(i){
  const items = document.querySelectorAll('.faq-item');
  items.forEach((el, idx) => {
    if (idx === i) el.classList.toggle('open');
    else el.classList.remove('open');
  });
}

function toggleFaq(){
  document.getElementById('faq-panel').classList.toggle('on');
}

buildFaq();

// ════════════════════════════════════
//  ⚙ CONFIGURAÇÃO
// ════════════════════════════════════
const CFG = {
  title:    "TRILHA — DIA 01: PREPARAÇÃO",
  firebase: {
    url:  "https://passo-a-passo-eventos-default-rtdb.firebaseio.com",
    path: "/trilha.json"
  }
};

// ════════════════════════════════════
//  ETAPAS — carregadas do Firebase
// ════════════════════════════════════
let STEPS = []; // preenchido via pullState()

// Checkpoint content — reconstruído quando STEPS muda
let CPS = [];

// Title overrides (sincronizados do Firebase via admin)
let TITLES = {};
function getTitle(id){
  return TITLES[id] !== undefined ? TITLES[id] : (STEPS.find(s=>s.id===id)||{}).title||'';
}

// ════════════════════════════════════
//  TYPE COLOURS
// ════════════════════════════════════
const TC = {
  PDF:      { c:"#FF7B72", bg:"#3D1212" },
  Aula:     { c:"#79C0FF", bg:"#0A1E3D" },
  Doc:      { c:"#56D364", bg:"#0A2D14" },
  Site:     { c:"#BC8CFF", bg:"#1A0A3D" },
  Skill:    { c:"#FFA657", bg:"#3D1E00" },
  Planilha: { c:"#39D4C5", bg:"#002D2A" },
  Prompt:   { c:"#F778BA", bg:"#3D0A22" },
};
const TE = {
  PDF:'🚩', Aula:'🚩', Doc:'🚩', Site:'🚩',
  Skill:'🚩', Planilha:'🚩', Prompt:'🚩',
};

// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
let unlocked    = 0;
let activeSheet = null;
let syncLive    = false;
const isFB      = !!CFG.firebase.url;

// ════════════════════════════════════
//  UTILS
// ════════════════════════════════════
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getScale(){
  const s = document.getElementById('road-svg');
  return s ? s.getBoundingClientRect().width / 360 : 1;
}

function leftNormal(path, t){
  const tot = path.getTotalLength();
  const dt  = 4;
  const p0  = path.getPointAtLength(Math.max(0, t - dt));
  const p1  = path.getPointAtLength(Math.min(tot, t + dt));
  const dx  = p1.x - p0.x, dy = p1.y - p0.y;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  return { x: -dy/len, y: dx/len };
}

// ════════════════════════════════════
//  BUILD TRAIL
// ════════════════════════════════════
function buildTrail(){
  document.getElementById('hdrTitle').textContent = CFG.title;

  if (STEPS.length === 0){
    document.getElementById('progFill').style.width = '0%';
    document.getElementById('progTxt').textContent  = 'Aguardando configuração...';
    document.getElementById('items-layer').innerHTML =
      `<div style="position:absolute;top:40px;left:50%;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:7px;color:#484F58;text-align:center;line-height:2.5;white-space:nowrap">AGUARDANDO<br>CONFIGURAÇÃO...</div>`;
    return;
  }

  document.getElementById('progFill').style.width = Math.round(unlocked/STEPS.length*100)+'%';
  document.getElementById('progTxt').textContent  = `${unlocked} / ${STEPS.length} etapas liberadas`;

  const path  = document.getElementById('road-path');
  const layer = document.getElementById('items-layer');
  const total = path.getTotalLength();
  const scale = getScale();
  layer.innerHTML = '';

  // Usamos N+2 pontos: posição 0 = INÍCIO, posição N+1 = CHEGADA,
  // posições 1..N = stops e checkpoints intercalados, SEM parada no INÍCIO.
  const N = STEPS.length * 2 + 1;

  for (let i = 0; i < N; i++){
    const t    = (i / (N-1)) * total;
    const pt   = path.getPointAtLength(t);
    const sx   = pt.x * scale;
    const sy   = pt.y * scale;

    if (i === 0){
      // Só texto INÍCIO — sem dot nem emoji
      const el = mk('div','trail-flag');
      el.style.cssText = `left:${sx}px;top:${sy}px`;
      el.innerHTML = `<span class="flag-txt">INÍCIO</span>`;
      layer.appendChild(el);

    } else if (i === N-1){
      const done = unlocked >= STEPS.length;
      const el   = mk('div','trail-flag');
      el.style.cssText = `left:${sx}px;top:${sy}px;opacity:${done?1:.3}`;
      el.innerHTML = `<span class="flag-icon">${done?'🏆':'🏁'}</span><span class="flag-txt">${done?'CONCLUÍDO!':'CHEGADA'}</span>`;
      layer.appendChild(el);

    } else if (i % 2 === 1){
      // ── STOP — posicionado no centro da estrada ──
      const si   = Math.floor(i/2);
      const s    = STEPS[si];
      const t2   = TC[s.type] || {c:'#999',bg:'#222'};
      const isOn = si < unlocked;

      const dot = mk('div', 'stop-dot' + (isOn ? '' : ' off'));
      dot.style.cssText = `left:${sx}px;top:${sy}px;${isOn?'background:'+t2.c:''}`;
      layer.appendChild(dot);

      const emoji = mk('div', 'stop-emoji' + (isOn ? '' : ' off'));
      emoji.style.cssText = `left:${sx}px;top:${sy}px`;
      emoji.textContent = TE[s.type] || '📌';
      emoji.addEventListener('click', () => {
        if (isOn) openStepSheet(s.id);
        else openLockedMsg();
      });
      layer.appendChild(emoji);

    } else {
      // ── CHECKPOINT ──
      const cpId   = i / 2;
      const cp     = CPS.find(c=>c.id===cpId) || {desc:'',link:''};
      const locked = unlocked < cpId;

      // só exibe o checkpoint se tiver conteúdo preenchido
      if (cp.desc){
        const wrap = mk('div','cp-item');
        wrap.style.cssText = `left:${sx}px;top:${sy}px`;
        const sq = mk('div',`cp-sq${locked?' cp-lock':' has-c'}`);
        sq.innerHTML = `<span class="cp-ico">▼</span>`;
        if (!locked) sq.addEventListener('click', ()=>openSheet(cpId));
        wrap.appendChild(sq);
        layer.appendChild(wrap);
      }
    }
  }
}

function mk(tag, cls){
  const el = document.createElement(tag);
  el.className = cls;
  return el;
}

// ════════════════════════════════════
//  BOTTOM SHEET
// ════════════════════════════════════
function openSheet(cpId){
  const cp = CPS.find(c=>c.id===cpId) || {desc:'',link:''};
  const s  = STEPS.find(x=>x.id===cpId);
  activeSheet = cpId;

  const cpLabel = cp.name || (s ? s.title : '');
  document.getElementById('sheetLbl').textContent =
    `▶ CP ${String(cpId).padStart(2,'0')} — ${cpLabel.toUpperCase()}`;

  const d = document.getElementById('sheetDesc');
  d.className = cp.desc ? 'sheet-desc' : 'sheet-desc empty';
  d.textContent = cp.desc || 'sem instruções ainda';

  const a = document.getElementById('sheetLink');
  if (cp.link){ a.href = cp.link; a.style.display='inline-flex'; }
  else { a.style.display='none'; }

  document.getElementById('sheetBg').classList.add('on');
  document.getElementById('sheet').classList.add('on');
}

function openStepSheet(stepId){
  const s = STEPS.find(x => x.id === stepId);
  if (!s) return;
  const t = TC[s.type] || {c:'#999',bg:'#222'};
  activeSheet = null;

  document.getElementById('sheetLbl').innerHTML =
    `<span style="background:${t.bg};color:${t.c};padding:2px 6px;font-size:5px">${s.type.toUpperCase()}</span>  ${esc(getTitle(stepId))}`;

  const d = document.getElementById('sheetDesc');
  d.className = 'sheet-desc';
  d.textContent = s.text;

  document.getElementById('sheetLink').style.display = 'none';
  document.getElementById('sheetBg').classList.add('on');
  document.getElementById('sheet').classList.add('on');
}

function closeSheet(){
  document.getElementById('sheetBg').classList.remove('on');
  document.getElementById('sheet').classList.remove('on');
  activeSheet = null;
}

function openLockedMsg(){
  activeSheet = null;
  document.getElementById('sheetLbl').textContent = '🔒 ETAPA BLOQUEADA';
  const d = document.getElementById('sheetDesc');
  d.className = 'sheet-desc';
  d.textContent = 'Calma, não chegamos aqui ainda!';
  document.getElementById('sheetLink').style.display = 'none';
  document.getElementById('sheetBg').classList.add('on');
  document.getElementById('sheet').classList.add('on');
}

// ════════════════════════════════════
//  PERSONAGEM PIXEL ART

function initCharacter(){
  const layer = document.getElementById('char-layer');
  if (document.getElementById('trail-char')) return;
  const wrap = document.createElement('div');
  wrap.id = 'trail-char';
  wrap.style.pointerEvents = 'auto';
  wrap.style.cursor = 'pointer';
  wrap.title = 'Clique para ver onde estamos';
  wrap.addEventListener('click', () => {
    if (STEPS.length === 0) return;
    if (unlocked === 0) {
      activeSheet = null;
      document.getElementById('sheetLbl').textContent = '🚀 PREPARADOS?';
      const d = document.getElementById('sheetDesc');
      d.className = 'sheet-desc';
      d.textContent = 'Vamos começar já!';
      document.getElementById('sheetLink').style.display = 'none';
      document.getElementById('sheetBg').classList.add('on');
      document.getElementById('sheet').classList.add('on');
    } else {
      const idx = Math.min(unlocked - 1, STEPS.length - 1);
      openStepSheet(STEPS[idx].id);
    }
  });
  const inner = document.createElement('div');
  inner.className = 'char-inner';
  inner.innerHTML = CHAR_SVG;
  wrap.appendChild(inner);
  layer.appendChild(wrap);
  updateCharacter(false);
}

function updateCharacter(animate = true){
  const char = document.getElementById('trail-char');
  if (!char) return;
  const path  = document.getElementById('road-path');
  const total = path.getTotalLength();
  const N     = STEPS.length * 2 + 1;
  const scale = getScale();

  const idx = unlocked === 0 ? 0 : Math.min(2 * unlocked - 1, N - 2);
  const t   = (idx / (N-1)) * total;
  const pt  = path.getPointAtLength(t);

  char.style.left = (pt.x * scale) + 'px';
  char.style.top  = (pt.y * scale) + 'px';

  if (animate){
    const inner = char.querySelector('.char-inner');
    inner.classList.remove('pop');
    void inner.offsetWidth;
    inner.classList.add('pop');
  }
}

// ════════════════════════════════════
//  FIREBASE — somente leitura
// ════════════════════════════════════
async function pullState(){
  if (!isFB) return;
  try {
    const r = await fetch(CFG.firebase.url + CFG.firebase.path + '?_=' + Date.now());
    if (!r.ok) throw 0;
    const data = await r.json();
    syncLive = true;

    let changed = false;

    if (data && typeof data === 'object'){
      // Load steps
      if (Array.isArray(data.steps) && data.steps.length > 0){
        const newStepsStr = JSON.stringify(data.steps);
        if (JSON.stringify(STEPS) !== newStepsStr){
          STEPS = data.steps.map(s => ({ id: s.id, type: s.type||'PDF', title: s.title||'', text: s.text||'' }));
          CPS = STEPS.map(s => {
            const existing = CPS.find(c => c.id === s.id);
            return existing || { id: s.id, name: '', desc: '', link: '' };
          });
          changed = true;
        }
      }

      const newStep = typeof data.step === 'number' ? Math.min(data.step, STEPS.length) : unlocked;
      if (newStep !== unlocked){ unlocked = newStep; changed = true; }

      if (data.cps){
        CPS.forEach(cp => {
          const remote = data.cps[String(cp.id)];
          if (remote){
            if (remote.name !== cp.name || remote.desc !== cp.desc || remote.link !== cp.link){
              cp.name = remote.name || '';
              cp.desc = remote.desc || '';
              cp.link = remote.link || '';
              changed = true;
            }
          }
        });
      }

      if (data.titles && typeof data.titles === 'object'){
        Object.keys(data.titles).forEach(id => {
          if (TITLES[id] !== data.titles[id]){ TITLES[id] = data.titles[id]; changed = true; }
        });
      }
    } else if (typeof data === 'number'){
      // suporte ao formato antigo
      if (data !== unlocked){ unlocked = data; changed = true; }
    }

    if (changed){ buildTrail(); updateCharacter(true); }

  } catch(e){ syncLive = false; }
  updateDot();
}

function updateDot(){
  const d = document.getElementById('syncDot');
  if (d) d.classList.toggle('live', syncLive);
}

// ════════════════════════════════════
//  INIT
// ════════════════════════════════════
if (!isFB) document.getElementById('fbNotice').classList.add('on');

let resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(()=>{ buildTrail(); updateCharacter(false); }, 120);
});

document.fonts.ready.then(()=>requestAnimationFrame(()=>{
  buildTrail();
  initCharacter();
  if (isFB){ pullState(); setInterval(pullState, 3000); }
}));
